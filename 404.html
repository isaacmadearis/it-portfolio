<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>404 — Isaac Madearis</title>
<meta name="robots" content="noindex">
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0a0d11; --panel:#10151b; --border:#212a32;
    --text:#c7d0d9; --text-dim:#5c6771; --text-bright:#eef3f6;
    --accent:#4fc9c9; --accent-dim:#2c6e6e; --amber:#dfa458;
  }
  *{ margin:0; padding:0; box-sizing:border-box; }
  body{
    background: var(--bg); color: var(--text);
    font-family:'JetBrains Mono', monospace; line-height:1.7;
    min-height:100vh; display:flex; align-items:center; justify-content:center;
    padding:28px;
  }
  .term{
    max-width:640px; width:100%; background: var(--panel);
    border:1px solid var(--border); padding:32px 34px;
  }
  .line{ font-size:14px; }
  .line .prompt{ color: var(--text-dim); }
  .line .cmd{ color: var(--accent); }
  .err{ color: var(--amber); margin-top:10px; font-size:14px; }
  .code{
    font-size: clamp(48px, 12vw, 84px); font-weight:700;
    color: var(--text-bright); margin:18px 0 4px; letter-spacing:-0.02em;
  }
  .msg{ color: var(--text-dim); font-size:13.5px; margin-bottom:26px; }
  .home-btn{
    display:inline-block; font-size:13.5px; font-weight:600;
    color: var(--accent); border:1px solid var(--accent-dim);
    padding:11px 18px; text-decoration:none;
    transition: background .2s ease, color .2s ease;
  }
  .home-btn:hover{ background: var(--accent); color:#08201f; }
  .cursor{ display:inline-block; color: var(--accent); animation: blink 1s step-end infinite; }
  @keyframes blink{ 50%{ opacity:0; } }
  @media (prefers-reduced-motion: reduce){ *{ animation:none !important; } }
</style>
</head>
<body>
  <div class="term">
    <div class="line"><span class="prompt">isaac@it-portfolio:~$</span> <span class="cmd">cat requested-page</span></div>
    <div class="err">cat: requested-page: No such file or directory</div>
    <div class="code">404</div>
    <div class="msg">This page doesn't exist — but the rest of the site does.<span class="cursor">_</span></div>
    <a class="home-btn" href="/">cd ~ &nbsp;→</a>
  </div>
</body>
</html>
